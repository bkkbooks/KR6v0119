front:
  text: 金剛峻經金剛頂一切如來深妙祕密金剛界大三昧耶修行四十九種壇法經作用威儀法則大毗盧遮那佛金剛心地法門密法戒壇法儀則整理者侯沖題解金剛峻經金剛頂一切如來深妙祕密金剛界大三昧耶修行四十九種壇法經作用威儀法則大毗盧遮那佛金剛心地法門密法戒壇法儀則密教經典一卷中國僧人編集作者不詳署大興善寺三藏沙門大廣智不空奉詔譯本文獻未為歷代大藏經所收也未見歷代經録著録目前僅見於敦煌文獻北敦號冬號正反兩面書寫背面文字與正面文字不能相接共計行以部為內容分節每部前有序分部的序號在每部之末正面行有首題內容從部第一抄至部第八因尾部數紙脫落故部第八僅抄前部文字殘缺後部文字及尾題另正面部第四分成兩個部分抄寫故有兩個尾題背面行內容從部第十五抄至部第二十六因背面首部紙張脫落部第十五首缺部第二十六後雖有餘紙但抄寫者沒有把部第二十六抄寫完整相反採取略寫大意的方式以結束全文故文獻實際尾缺本文獻抄寫後缺少認真校對故背面文字脫漏部第二十整部此外部第一部第五部第六部第十五部第十六部第二十二部第二十三部第二十四部第二十五部第二十六均有明顯抄脫或錯簡的地方李翊灼敦煌石室經卷中未入藏經論著述目録最早著録本文獻但錯將本文獻當作名為金剛峻經金剛頂一切如來深妙祕密金剛界大三昧耶修行四十九種壇法經作用威儀法則與大毗盧遮那佛金剛心地法門密法戒壇法儀則的兩個文獻敦煌遺書總目索引將李翊灼敦煌石室經卷中未入藏經論著述目録編入敦煌遺書散録之十五並順序將兩個文獻編作第號第號故後來不少學者如呂建福賴富本宏都使用散來指稱該寫本本文獻的名稱與金剛峻經金剛頂一切如來深妙祕密金剛界大三昧耶修行四十二種壇法經作用威儀法則大毗盧遮那佛金剛心地法門密法戒壇法儀則以下簡稱四十二種相比只有四十二種四十九種之別內容也有相近的地方只是四十二種偏重敘述壇法的組成行持和傳承而本文獻更偏重記述安壇之法佛菩薩名字身色座位之處因此它們屬於同一種法會道場儀的不同部分兩者需要與最上大乘深妙祕密金剛界大三昧耶總持大教王成佛經等其他材料一同組合起來才能構成行持一場金剛瑜伽教法會的完整文本本文獻與四十二種一樣均署大興善寺三藏沙門大廣智不空奉詔譯但四十二種之卷四包含有中國禪宗傳法譜系等相當多不空圓寂之後才出現的中國佛教的內容說明該文獻並非不空所譯從其中包括的內容比較混雜來看四十二種很可能是唐末五代中國僧人出於行持法會的需要根據密教金剛部經典禪宗燈史和自己對密教的理解編纂而成並把文獻作者假托到不空名下有關情況參見藏外佛教文獻本輯所載四十二種的題解本文獻的性質與四十二種相同均屬於受不空所傳金剛部密教影響而成的瑜伽教道場儀不空之後出現的瑜伽教道場儀是中國僧人結合當時佛教顯密諸派典籍的撰述並非傳譯本就本文獻內容來看是研究密教中國化和早期中國佛教科儀的重要資料對了解中唐至宋代的瑜伽教尤其是水陸法會儀的發展進程有重要價值本文獻為歸義軍時期寫本除殘缺並有抄寫脫漏外傳抄過程中錯訛別字亦較多整理難度較大往往需要依據本人對法會儀式的知識進行文字的釐定由於學識有限本次整理對文字的辨識與理解肯定存在不足和錯誤盼方家批評指正底校本說明如下底本北敦號校本無録文
