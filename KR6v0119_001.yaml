body:
  text: 大興善寺三藏沙門大廣智不空奉詔譯爾時佛於初現蓮花藏世界共會諸天菩薩八萬人俱佛告諸天菩薩吾今開説最上大乘深妙祕密金剛界大三昧耶總持大教王成佛經佛告諸天菩薩吾今開啓此最上大乘深妙祕密金剛界大三昧耶大毗盧遮那佛稟受奉行現身是佛諸天聞説愕然而起不能信受辭退而去金剛藏菩薩起立合掌白佛言世尊聞佛所説最上大乘不能信受諸天菩薩為是小乘不能信受所以愕然而起願佛慈悲為我宣説安壇之法菩薩名字佛告金剛藏菩薩讚言善哉善哉汝等諦聽諦聽吾當為汝分別解説安壇之法菩薩名字座位之處兼及身色先安五佛後安菩薩並四攝中心安盧舍那佛身黃色手執總持之印頂戴五佛之冠第二阿閦佛在東門身白色頂戴五佛冠手結身忍印右手垂觸地左手安臍偃是名身忍印第三寶生佛在南門身青色頂戴五佛冠右手垂膝偃左手如意寶是名施願印願一切衆願滿足第四阿彌陀佛在西門身赤色頂戴五佛冠二羽仰相叉進力竪相背禪智橫其端等心青蓮花是名長壽印第五不空成就佛在北門身是緑頂戴五佛冠左手安總持右手施無畏願一切衆生速證無畏法第一金剛薩埵王菩薩在東門身白色左脅安呼召右耳羯磨杵是名悉地印願一切衆生速成勝地第二金剛王菩薩在南門身青色二羽安定惠名為心定之印願一切衆生速得無畏定第四金剛善哉菩薩在南門身青色二羽安素怛藍名為惠之印願一切衆生速證惠之身第五金剛寶菩薩在西門身赤色二羽安懷中寶劍執當心名為寶身印願一切衆生惠寶滿其身第六金剛光菩薩在西門身赤色二羽舒進力當心而下垂名為身光印願一切衆生光明變遍身第七金剛幢菩薩在北門身緑色二羽在右邊手執大法幢名為法幢印願一切衆生速證法寶身第八金剛笑菩薩在北門身緑色二羽口偃名為法喜印願一切衆生速成法喜身第九金剛法菩薩在東門身白色左蓮右開敷名為開法印願一切衆生蓮開證法身第十金剛利菩薩在東門身白色左蓮右利劍是名法利印願一切衆生斷諸煩惱得證法王身第十一金剛因菩薩在南門身青色覆拳進力柱於臍而平轉名為因法印願一切衆生因緣會遇時果滿證菩提第十二金剛語菩薩在南門身青色先從禪智舒旋舞心兩頰右手執利劍左手安左脅名為法語印願一切衆生菩提法語利衆生第十三金剛業菩薩在西門身赤色二羽金剛執於劍掌於頂印形法羯磨願一切衆生速成羯磨身第十四金剛護菩薩在西門身赤色二拳被甲胄名為護法印願一切衆生速證法王身第十五金剛藥叉菩薩在北門身緑色二羽安兩頰四牙熾盛身是名藥叉印願一切衆生速成護法身第十六金剛拳菩薩在北門身緑色身端二羽安總持是名總持印願一切衆生速證總持身十六大士印內外八供養並及於四護印相今當説第一金剛心印菩薩在東門身白色二羽安腰側端心供養佛是名心法印願一切衆生心心是佛第二金剛鬘菩薩在東門身白色二羽當心如捧鬘奉獻諸聖尊是名嚴身印願一切衆生速證菩提身第三金剛持法菩薩在南門身青色二羽側相合十度相交竪是名持法印願一切衆生護持法正身第四金剛極喜菩薩在南門身青色二拳如舞儀降魔諸煩惱歡喜供養佛是名極喜印願一切衆生斷除諸煩惱得證法喜身燒香等此印以降三世印第五金剛結淨印菩薩在西門身赤色二羽並拳向下散辟除一切惡是名結淨印願一切衆生斷除煩惱垢證取淨法身第六金剛定菩薩在西門身赤色二羽仰散如捧花是名戒定印願一切衆生速證戒定身第七金剛戒惠菩薩在北門身緑色二拳禪智竪如針是名戒惠印願一切衆生惠燈照十方第八金剛解脫菩薩在北門身緑色左一羽安呼召右羽安降魔是名解脫印願一切衆生總攝解脫身東門大慈金剛身白色右羽藥叉劍左拳安腰側是名降三世南門大悲金剛身青色二羽執於索是名金剛縛西門大喜金剛身赤色二羽執鎖是名收攝印北門大捨金剛身緑色左羽安呼召右羽執降魔是名總攝印觀行五如來咒毗盧遮那佛唵阿閦佛唵吽寶生佛唵呾洛阿彌陀佛唵纈哩不空成就佛唵噁修行之人入大乘者觀此身印即是佛身更莫異緣速得成佛頂上毗盧遮那佛白色額上阿閦佛青色右邊寶生佛黃色後面阿彌陀佛赤色左邊不空成就佛緑色右額角上盧左曩地藏菩薩胃左額角上摩計水藏菩薩血後右邊婆拏囉縛悉泥火藏菩薩脾後左邊哆囉你尾風藏菩薩氣息眼是嚕波縛唧哩色菩薩耳是設沒那縛唧哩聲菩薩鼻是唁陀縛唧哩香菩薩舌是囉思縛唧哩味菩薩身是薩鉢囉思縛唧哩觸菩薩意是達里摩他都縛悉唧哩心菩薩東門也滿哆歌大慈金剛南門大悲鉢囉喏哆歌大悲金剛西門鉢特摩哆歌大喜金剛北門尾隔𭉻哆歌大捨金剛身上一一持配不得異緣密之大乘觀想先端身正坐心莫異緣舌佇上腭良久彈指三下念淨三業真言三遍然後想念盡虛空遍法界盡是諸佛菩薩心念禮拜至仰虔心不得異緣至心受持深妙祕密金剛界大三昧耶總持大教王成佛經稟受奉行現身是佛佛説五佛壇菩薩名録座位之處部第一爾時佛説釋迦牟尼佛化身作密迹金剛降伏三千大千世界一切惡賊天魔外道將及守護國界大降魔將嚴峻極惡泔露降伏一切毒惡夜叉羅剎鬼神猛烈根本大降魔將密迹金剛之壇法佛告金藏菩薩此金剛之法若是自身欲作金剛降伏一切惡賊天魔外道夜叉羅剎一切鬼神祕密受持當結此金剛壇其壇四方闊二十四肘高三肘用淨土七寶香泥四寶合成用四重金剛界內安四十八大藥叉大金剛中心安八角火輪火輪外地黃色安八佛頂火輪內白色安八總持中心安須彌山山上安大密迹金剛身青色本身一百八臂身金色壇內供養安八臂身青色八臂四面正面青色右面白色左面緑色頂上面黃頭上安九條黃龍二羽壇惠相鈎結進力二皆竪身相忿怒王八臂而四面笑怒恐怖形四牙熾盛身是名總持印輪鉾並定惠是名無礙印壇四角安四天王東角安提頭賴吒天王身白色南角安毗樓勒叉天王身青色西角安毗樓博叉天王身赤色執利劍北角安毗沙門天王身緑色右羽執長叉左羽本師塔壇每門安劍六口輪三所並道具箭十二隻飯十二分第一院金剛界安十六大金剛三頭四臂身軸門色二羽執利劍二羽執於輪或在心輪或在頂輪足踏頂輪是名大降魔印第二院金剛界亦安十六大金剛三眼二臂身軸門色踏足生死或執叉及杵或執輪及劍大金剛變化種種身形各軸門色或於四臂或於臂或執輪劍或執輪杵足踏毗那夜迦是名總持之印四十八大金剛總攝身印降魔三千大千世界所有一切毒惡一切狂賊徒一切不祥之事但請三藏法主開建此金剛之壇欲請聖衆但燒安息香大將即來仍須洗浴令淨著新淨衣身被七寶袈裟七寶坐具方乃入壇迎請聖衆莫生嗔怒至心啓告祕密受持一切惡魔當下消滅壇外安大鐵圍山小鐵圍山金山黑山七寶金山佛説密迹金剛畫像安壇名録部第二爾時佛住靈鷲山中共會諸天菩薩萬二千人俱説天王護國壇法若是南閻浮提諸大國王諸小國王共相侵害天魔外道狂口賊徒侵撓國度仁王不安人民不樂仁王帝主當請三藏開啓天王之壇法護國護人結此壇時其壇十二角闊十二肘高二肘用三層每層上十二角總安八角之火輪內一層方亦安八角之火輪上安八總持八角輪外安八佛頂每門安輪三所瓶兩所劍兩口並道具箭十二隻飯二十四分其壇七寶之壇地是七寶之地東門黃色南門青色西門赤色北門緑色東門提頭賴吒天王白色南門毗樓勒叉天王青色西門毗樓博叉天王赤色北門毗沙門天王緑色中心本身黃色從里第一院金剛界八大藥叉王東門安二大藥叉王一身八臂四面身面青右面緑左面白頂上面黃二羽執降魔在當心二羽執定惠在兩邊二羽執叉杵亦在兩邊二羽執利劍交在頂腳踏於輪是名總攝印第二藥叉身三頭四臂身青色戴黃金鉀二羽執輪杵在耳邊二羽執定惠在邊足踏於輪是名總持印南門二大藥叉王一身八臂四面身青色正面青色右面緑色左面白色二羽執輪在當心二羽執定惠在兩邊二羽執杵索亦在兩邊二羽執利劍交在頂二足踏於輪是名總持印第二身青色四臂三面身戴黃金之甲二羽執於輪在於心二羽執於杵在耳邊足踏於二輪是名降魔印西門二大藥叉王身青色一身八臂四面身面青口面白左面緑色頂上面黃色二羽鎖在當心定惠在兩邊二輪垂於膝二劍交於頂兩足踏於輪是名總攝印第二藥叉王四臂三面身青色戴黃金之甲正面青色右面白色左面緑色二羽執於輪在耳邊二羽執降魔在心門足踏於二輪是名持印北門二大藥叉王身青色一身八臂四面身戴黃金甲正面青色右面赤色左面緑色頂上黃色二羽執降魔在心門二羽執輪叉在兩邊二羽執輪杵在於膝二羽執利劍交在頂之上足踏於二輪是名總攝印第二藥叉王三頭四臂身戴黃金之甲正面青色右面赤色左面緑色二羽執杵在腰邊二羽執輪鈎在耳邊足踏於二輪是名攝持印次第二院金剛界八大藥叉王東門二大藥叉王身青色三頭四臂身戴黃金甲二羽執於輪在心門二羽執利劍交在頂之上二足踏於輪是名攝持印第二身亦三頭四臂身戴黃金之甲二羽執利劍雙交在心門二羽執於輪在耳邊二足踏於輪是名總攝印南門二大藥叉王身青色三頭四臂身戴黃金甲二羽張定惠在左脅邊二羽執輪杵在耳邊足踏於二輪是名定印第二身亦是三面四臂身戴黃金之甲二羽執於輪在心門二羽執利劍交在頂之上二足踏於輪是名降魔印西門二大藥叉王身青色三面四臂身戴黃金之甲二羽執於利劍在心兩脅二羽執輪鈎在耳邊足踏於輪是名總攝印第二身亦是三面四臂戴黃金之甲二羽執利劍交在於心門二羽執於輪在耳邊足踏於二輪是名總持印北門二大藥叉王身青色三面四臂身戴黃金之甲二羽執利劍竪在於兩脅二羽執輪在耳邊足踏於二輪是名攝持印第二亦是三面四臂身戴黃金甲二羽執於輪相交在心門二羽執利劍交叉在於頂足踏於二輪是名總攝印次第三院金剛界八大藥叉王身青色四面八臂戴黃金之甲各執於器具東門二大藥叉王四面八臂身戴黃金之甲二羽執降魔在當心二羽執定惠在兩膝二羽執輪鈎應在身兩邊二羽執利劍相交在頂之上二足踏於輪是名降魔印第二藥叉身四面六臂戴黃金甲二羽執利劍相交在心門二羽執輪杵在身兩邊二羽執於輪應在兩邊二足踏於輪是名攝持印南門二大藥叉王身青色八臂四面身戴黃金之甲二羽執於輪應在於心門二羽執定惠垂在於兩膝二羽執杵索應在於兩邊二羽執利劍相交於頂上二足踏於輪是名降魔印第二大藥叉王身六臂四面身青色戴黃金之甲二羽執於輪相交在心門二羽執定惠在於身兩邊二羽執利劍相交在頂上二足踏於輪是名總攝印西門二大藥叉王身青色一身八臂而四面戴黃金之甲二羽執於鎖應在於心門二羽執於輪垂在兩膝邊二羽執定惠應在身兩邊二羽執利劍相交頂之上足踏於二輪是名降魔印第二大藥叉王六臂而四面身戴黃金甲二羽執輪杵垂在兩膝邊二羽執定惠應在身兩邊二羽執利劍相交頂輪上二足踏於輪是名總攝印北門二大藥叉王亦是身青色第一身八臂而四面身戴黃金甲二羽執降魔應在於心門二羽執定惠垂在兩膝邊二羽執輪